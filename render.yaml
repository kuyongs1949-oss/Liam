services:
  - type: web
    name: noise-backend
    runtime: node
    rootDir: backend
    buildCommand: npm ci --omit=dev
    startCommand: node src/server.js
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: CALCULATOR_URL
        value: https://noise-calculator.onrender.com

  - type: web
    name: noise-calculator
    runtime: python
    rootDir: calculator
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn src.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
