version: '3.9'

services:
  postgres:
    image: postgis/postgis:15-3.3
    container_name: noise_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: noise_assessment
      POSTGRES_USER: noise_user
      POSTGRES_PASSWORD: noise_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/src/config/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U noise_user -d noise_assessment"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: noise_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  calculator:
    build:
      context: ./calculator
      dockerfile: Dockerfile
    container_name: noise_calculator
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - REDIS_URL=redis://redis:6379
    depends_on:
      redis:
        condition: service_healthy

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: noise_backend
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      - DATABASE_URL=postgresql://noise_user:noise_pass@postgres:5432/noise_assessment
      - REDIS_URL=redis://redis:6379
      - CALCULATOR_URL=http://calculator:8000
      - NODE_ENV=production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
